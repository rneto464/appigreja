<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Escala</title>
    
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>EDITAR ESCALA</h1>
        <div class="escala-card">
            <h3>{{ escala.tipo_escala }} ({{ escala.data }}):</h3>
            
            <form action="{{ url_for('atualizar_escala_web', escala_id=escala.id) }}" method="post" class="edit-form">
                <label for="cerimoniarios">Cerimoniários:</label>
                <select name="cerimoniarios" multiple>
                    {% for pessoa in todos_cerimoniarios %}
                        <option value="{{ pessoa.nome }}" {% if pessoa.nome in escala.cerimoniarios.split(', ') %}selected{% endif %}>{{ pessoa.nome }}</option>
                    {% endfor %}
                </select>

                <label for="veteranos">Veteranos:</label>
                <select name="veteranos" multiple>
                    {% for pessoa in (todos_veteranos + todos_cerimoniarios) %}
                        <option value="{{ pessoa.nome }}" {% if pessoa.nome in escala.veteranos.split(', ') %}selected{% endif %}>{{ pessoa.nome }}</option>
                    {% endfor %}
                </select>

                <label for="criancas">Crianças:</label>
                <select name="criancas" multiple>
                    {% for pessoa in todas_criancas %}
                        <option value="{{ pessoa.nome }}" {% if pessoa.nome in escala.criancas.split(', ') %}selected{% endif %}>{{ pessoa.nome }}</option>
                    {% endfor %}
                </select>
                
                {% if escala.tipo_escala.startswith('Domingo') %}
                    <hr>
                    <h4>Funções Especiais</h4>
                    
                    <label for="turibulo">Turíbulo:</label>
                    <select name="turibulo" multiple> {# Adicionado 'multiple' #}
                        {% for nome in candidatos_turibulo %}
                            <option value="{{ nome }}" {% if nome in escala.turibulo.split(', ') %}selected{% endif %}>{{ nome }}</option> {# Lógica de seleção atualizada #}
                        {% endfor %}
                    </select>

                    <label for="naveta">Naveta:</label>
                    <select name="naveta" multiple> {# Adicionado 'multiple' #}
                         {% for nome in candidatos_naveta %}
                            <option value="{{ nome }}" {% if nome in escala.naveta.split(', ') %}selected{% endif %}>{{ nome }}</option> {# Lógica de seleção atualizada #}
                        {% endfor %}
                    </select>
                    <label for="tochas">Tochas:</label>
                    <select name="tochas" multiple>
                        {% for nome in candidatos_tochas %}
                            <option value="{{ nome }}" {% if nome in escala.tochas.split(', ') %}selected{% endif %}>{{ nome }}</option>
                        {% endfor %}
                    </select>
                {% endif %}

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" style="flex: 1;">Salvar Alterações</button>
                    <a href="{{ url_for('index') }}" class="button-link" style="flex: 1; margin: 0; background-color: #6c757d;">Voltar</a>
                </div>
            </form>

            <hr style="margin-top: 20px;">
            <form action="{{ url_for('remover_escala', escala_id=escala.id) }}" method="post" onsubmit="return confirm('Tem a certeza que deseja remover permanentemente esta escala?');">
                <button type="submit" class="button-danger" style="width: 100%;">Remover Escala Permanentemente</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            $('select').select2({
                placeholder: 'Clique para selecionar ou pesquisar nomes',
                width: '100%'
            });
        });
    </script>
</body>
</html>
