<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Nova Escala</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>
<body>
    <div class="container">
        <h1>Adicionar Nova Escala para {{ data_formatada }}</h1>

        <div class="escala-card">
            <form action="{{ url_for('salvar_nova_escala') }}" method="post" class="edit-form">
                
                <input type="hidden" name="data" value="{{ data_formatada }}">

                <label for="tipo_escala">Tipo de Escala / Evento:</label>
                <input type="text" id="tipo_escala" name="tipo_escala" placeholder="Ex: Missa Solene, Casamento, Vigília..." required>

                <label for="cerimoniarios">Cerimoniários:</label>
                <select name="cerimoniarios" multiple>
                    {% for pessoa in todos_cerimoniarios %}
                        <option value="{{ pessoa.nome }}">{{ pessoa.nome }}</option>
                    {% endfor %}
                </select>

                <label for="veteranos">Veteranos:</label>
                <select name="veteranos" multiple>
                    {% for pessoa in (todos_veteranos + todos_cerimoniarios) %}
                        <option value="{{ pessoa.nome }}">{{ pessoa.nome }}</option>
                    {% endfor %}
                </select>

                <label for="criancas">Crianças:</label>
                <select name="criancas" multiple>
                    {% for pessoa in todas_criancas %}
                        <option value="{{ pessoa.nome }}">{{ pessoa.nome }}</option>
                    {% endfor %}
                </select>

                <hr>
                <h4>Funções Especiais</h4>

                <label for="turibulo">Turíbulo:</label>
                <select name="turibulo" multiple>
                    {% for nome in candidatos_funcoes_especiais %}
                        <option value="{{ nome }}">{{ nome }}</option>
                    {% endfor %}
                </select>

                <label for="naveta">Naveta:</label>
                <select name="naveta" multiple>
                    {% for nome in candidatos_funcoes_especiais %}
                        <option value="{{ nome }}">{{ nome }}</option>
                    {% endfor %}
                </select>

                <label for="tochas">Tochas:</label>
                <select name="tochas" multiple>
                    {% for nome in candidatos_funcoes_especiais %}
                        <option value="{{ nome }}">{{ nome }}</option>
                    {% endfor %}
                </select>
                
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" style="flex: 1;">Salvar Nova Escala</button>
                    <a href="{{ url_for('index') }}" class="button-link" style="flex: 1; margin: 0; background-color: #6c757d;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            $('select').select2({
                placeholder: 'Clique para selecionar ou pesquisar nomes',
                width: '100%'
            });
        });
    </script>
</body>
</html>
