<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Pessoa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Editar: {{ pessoa.nome }}</h1>
        <form method="post" class="form-section">
            <label for="grupo_pessoa">Grupo Principal:</label>
            <select id="grupo_pessoa" name="grupo" required>
                <option value="cerimoniario" {% if pessoa.grupo == 'cerimoniario' %}selected{% endif %}>Cerimoniário</option>
                <option value="veterano" {% if pessoa.grupo == 'veterano' %}selected{% endif %}>Veterano</option>
                <option value="crianca" {% if pessoa.grupo == 'crianca' %}selected{% endif %}>Criança</option>
            </select>

            <div style="margin-top: 20px; margin-bottom: 20px;">
                <label style="display: block; font-weight: bold;">Funções Adicionais:</label>
                {% set funcoes_atuais = pessoa.funcoes_adicionais.split(',') if pessoa.funcoes_adicionais else [] %}
                <div>
                    <input type="checkbox" id="turibulo" name="funcoes" value="turibulo" {% if 'turibulo' in funcoes_atuais %}checked{% endif %}>
                    <label for="turibulo">Turíbulo</label>
                </div>
                <div>
                    <input type="checkbox" id="naveta" name="funcoes" value="naveta" {% if 'naveta' in funcoes_atuais %}checked{% endif %}>
                    <label for="naveta">Naveta</label>
                </div>
                <div>
                    <input type="checkbox" id="tochas" name="funcoes" value="tochas" {% if 'tochas' in funcoes_atuais %}checked{% endif %}>
                    <label for="tochas">Tochas</label>
                </div>
            </div>

            <button type="submit">Salvar Alterações</button>
            <a href="{{ url_for('gerenciar_pessoas') }}" class="button-link">Cancelar</a>
        </form>
    </div>
</body>
</html>
